strategy:
  name: ranking_v1
  enabled: true
  rebalance: daily
  top_n: 30
  weighting: equal
  allow_testing_factors: false
  allow_review_factors: true
factors:
  mode: explicit
  selected:
  - bp
  - ep
  - size
  blacklist: []
  weights:
    bp: 0.0
    ep: 0.0
    size: 0.0
  score_transform: none
constraints:
  max_weight_per_asset: 0.05
  min_selected_assets: 5
